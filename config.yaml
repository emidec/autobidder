# config.yaml - scoring parameters for score_bids.py
#
# Plain scalars. PyYAML is used if installed; otherwise score_bids.py parses this
# flat key/value file with a built-in fallback (no third-party dependency needed).

# ---- OUTPUT RANGE -----------------------------------------------------------
# Bids are written to the CSV in [-bid_max, bid_max]. HotCRP preferences are integers.
bid_max: 20
bid_limit: 100          # validation ceiling (HotCRP allows up to |100|)

# ---- SCORING ----------------------------------------------------------------
ref_max: 20             # internal reference span the score is computed on (leave as-is)

# How much your -2..2 topic interests steer the bid vs. semantic similarity to your
# own papers. 0 = ignore interests (pure semantic), 1 = ignore papers (pure interests).
interest_weight: 0.35

# How sharply semantic similarity maps onto the score scale. Similarity is rank/quantile-
# transformed across submissions onto +/-ref_max (robust, and independent of the pool's
# spread so the blend with topic interests is stable across venues); sem_gain then shapes
# the curve: 9 is neutral/linear, higher pushes mid-rank papers toward the rails (more
# separation between near-miss and on-target), lower flattens it.
sem_gain: 9.0
